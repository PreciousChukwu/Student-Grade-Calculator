<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Student Grade Calculator</title>
        <link rel ="stylesheet" href="style.css">
    </head>
    <body>
     <h1> Student Grade Calculator</h1>
     <form action="" method="">
      <fieldset>
        <legend> Student Information</legend>
    <div>
        <label>Name</label>
    <input type="text" id="name" name="Name" placeholder="Enter your name" required/>
    </div>
    <div>
        <label>Course Unit</label>
    <select id="unit" name="Course Unit" required>
        <option value="">Select Course Unit</option>
        <option>1 unit</option>
        <option>2 units</option>
        <option>3 units</option>
        </select>
    </div>
    <div>
        <label>Classwork</label>
    <input type="number" min="0" max="10" id="classwork" name="Classwork" placeholder="Enter classwork score" required/>
    </div>
    <div>
        <label>Attendance</label>
    <input type="number" min="0" max="5" id="attendance" name="Attendance" placeholder="Enter attendance score" required/>
    </div>
    <div>
        <label>Assignment</label>
    <input type="number" min="0" max="10" id="assignment" name="Assignment" placeholder="Enter assignment score" required/>
    </div>
    <div>
        <label>Mid-semester</label>
    <input type="number" min="0" max="15" id="mid-semester" name="Mid-Semester" placeholder="Enter mid-Semester score" required/>
    </div>
    <div>
        <label>Exam</label>
    <input type="number" min="0" max="60" id="exam" name="Exam" placeholder="Enter exam score" required/>
    </div>
      
     
    </fieldset>
    <button type= "submit">Calculate Result</button>
    </form>

     <div id="result" style="display: none;">
    <h2>Result</h2>
    <p id="displayName"></p>
    <p id="displayUnit"></p>
    <p id="displayScore"></p>
    <p id="displayGrade"></p>
     </div>
     <script src="script.js"></script>
    </body>
    
</html>
